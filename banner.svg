<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d001a"/>
      <stop offset="40%" style="stop-color:#1e0038"/>
      <stop offset="70%" style="stop-color:#3d0066"/>
      <stop offset="100%" style="stop-color:#6600aa"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes twinkle1 { 0%,100%{opacity:1} 50%{opacity:0.1} }
    @keyframes twinkle2 { 0%,100%{opacity:0.3} 50%{opacity:1} }
    @keyframes twinkle3 { 0%,100%{opacity:0.7} 30%{opacity:0.1} 70%{opacity:1} }
    @keyframes shimmer  { 0%,100%{opacity:0.85} 50%{opacity:1} }
    @keyframes tagfade  { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes blink    { 0%,100%{opacity:1} 49%{opacity:1} 50%{opacity:0} 99%{opacity:0} }
    @keyframes scanline { 0%{transform:translateY(-220px)} 100%{transform:translateY(220px)} }
    @keyframes floatup  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes colorcycle {
      0%   { fill: #ff6ec7; }
      25%  { fill: #ffffff; }
      50%  { fill: #cc00ff; }
      75%  { fill: #e879f9; }
      100% { fill: #ff6ec7; }
    }
    @keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

    .t1{animation:twinkle1 2s ease-in-out infinite}
    .t2{animation:twinkle2 1.7s ease-in-out infinite 0.4s}
    .t3{animation:twinkle3 2.3s ease-in-out infinite 0.8s}
    .t4{animation:twinkle1 1.5s ease-in-out infinite 1.2s}
    .t5{animation:twinkle2 2.6s ease-in-out infinite 0.2s}
    .t6{animation:twinkle3 1.9s ease-in-out infinite 1.5s}
    .t7{animation:twinkle1 2.1s ease-in-out infinite 0.6s}
    .t8{animation:twinkle2 1.8s ease-in-out infinite 1s}
    .t9{animation:twinkle3 2.4s ease-in-out infinite 0.3s}
    .t10{animation:twinkle1 1.6s ease-in-out infinite 1.8s}
    .t11{animation:twinkle2 2.2s ease-in-out infinite 0.7s}
    .t12{animation:twinkle3 2s ease-in-out infinite 1.3s}

    .nametext{animation:shimmer 2.5s ease-in-out infinite; transform-origin:450px 95px}
    .tagline{animation:tagfade 3s ease-in-out infinite 0.5s}
    .cursor{animation:blink 1s step-end infinite}
    .scanline{animation:scanline 4s linear infinite; opacity:0.04}
    .heart{transform-origin:450px 170px; animation:heartbeat 1.5s ease-in-out infinite}
    .pixelname{animation:colorcycle 4s linear infinite}
  </style>

  <!-- bg -->
  <rect width="900" height="220" fill="url(#bg)"/>

