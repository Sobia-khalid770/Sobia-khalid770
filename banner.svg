<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d001a"/>
      <stop offset="40%" style="stop-color:#1e0038"/>
      <stop offset="70%" style="stop-color:#3d0066"/>
      <stop offset="100%" style="stop-color:#6600aa"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6ec7;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#ff6ec7;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#cc00ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#cc00ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- grid lines horizontal -->
  <g stroke="#ffffff08" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
  </g>
  <!-- grid lines vertical -->
  <g stroke="#ffffff06" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- glowing orbs -->
  <ellipse cx="150" cy="100" rx="120" ry="80" fill="#cc00ff" opacity="0.08" filter="url(#softglow)"/>
  <ellipse cx="750" cy="100" rx="120" ry="80" fill="#ff6ec7" opacity="0.08" filter="url(#softglow)"/>
  <ellipse cx="450" cy="90" rx="160" ry="90" fill="#7700cc" opacity="0.07" filter="url(#softglow)"/>

  <!-- stars -->
  <g fill="white">
    <circle cx="50" cy="20" r="1" opacity="0.8"/>
    <circle cx="180" cy="15" r="1.2" opacity="0.9"/>
    <circle cx="320" cy="25" r="0.8" opacity="0.7"/>
    <circle cx="480" cy="12" r="1" opacity="0.85"/>
    <circle cx="620" cy="20" r="1.1" opacity="0.75"/>
    <circle cx="780" cy="16" r="0.9" opacity="0.8"/>
    <circle cx="860" cy="28" r="1" opacity="0.7"/>
    <circle cx="30" cy="60" r="0.8" opacity="0.6"/>
    <circle cx="260" cy="50" r="1" opacity="0.7"/>
    <circle cx="700" cy="45" r="0.9" opacity="0.75"/>
    <circle cx="840" cy="55" r="1.1" opacity="0.65"/>
    <circle cx="120" cy="170" r="0.9" opacity="0.6"/>
    <circle cx="400" cy="180" r="1" opacity="0.5"/>
    <circle cx="680" cy="175" r="0.8" opacity="0.6"/>
    <circle cx="820" cy="165" r="1" opacity="0.55"/>
  </g>

  <!-- sparkles -->
  <g fill="#ff6ec7" filter="url(#glow)">
    <polygon points="60,90 62,97 69,99 62,101 60,108 58,101 51,99 58,97" opacity="0.9"/>
    <polygon points="840,85 841.5,90 847,91.5 841.5,93 840,98 838.5,93 833,91.5 838.5,90" opacity="0.8"/>
  </g>
  <g fill="#cc00ff" filter="url(#glow)">
    <polygon points="820,30 821,34 825,35 821,36 820,40 819,36 815,35 819,34" opacity="0.7"/>
    <polygon points="75,155 76.5,160 81,161.5 76.5,163 75,168 73.5,163 68,161.5 73.5,160" opacity="0.65"/>
  </g>

  <!-- accent line -->
  <line x1="0" y1="140" x2="900" y2="140" stroke="url(#line)" stroke-width="1" opacity="0.6"/>

  <!-- code tag decoration left -->
  <text x="48" y="108" font-family="'Courier New', monospace" font-size="13" fill="#cc00ff" opacity="0.5" filter="url(#glow)">&lt;dev&gt;</text>
  <!-- code tag decoration right -->
  <text x="800" y="108" font-family="'Courier New', monospace" font-size="13" fill="#cc00ff" opacity="0.5" filter="url(#glow)">&lt;/dev&gt;</text>

  <!-- main name -->
  <text x="450" y="95" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#ffffff" filter="url(#glow)" letter-spacing="4">Sobia Khalid</text>

  <!-- glowing underline under name -->
  <line x1="230" y1="108" x2="670" y2="108" stroke="url(#line)" stroke-width="1.5" opacity="0.9"/>

  <!-- tagline -->
  <text x="450" y="133" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#e879f9" letter-spacing="3" opacity="0.9">AI STUDENT  ·  JAVA DEVELOPER  ·  BUILDING WHAT MATTERS</text>

</svg>
